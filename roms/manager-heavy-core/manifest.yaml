rom_name: manager-heavy-core
rom_family: manager-heavy
rom_version: 0.6.0
description: >-
  Manager-first AI Agent OS distribution for coordination-heavy workspaces.
  Full template set with battle-tested principles, escalation templates,
  OKR control plane, TODO-first heartbeat, dream maintenance boundaries,
  turbo-frequency heartbeat discipline, and file-backed memory system.

spec_version: 1.0.0
requires_spec: ">=1.0.0"
compatible_spec_range: ">=1.0.0 <2.0.0"
compatibility_status: fully-compatible

included_skills:
  - name: agent-manager
    source:
      type: git
      repo: https://github.com/fractalmind-ai/agent-manager-skill.git
      ref: main
      path: agent-manager
  - name: team-manager
    source:
      type: git
      repo: https://github.com/fractalmind-ai/team-manager-skill.git
      ref: main
      path: team-manager

optional_skills:
  - name: agent-calendar
    source:
      type: git
      repo: https://github.com/fractalmind-ai/agent-calendar-skill.git
      ref: v0.1.0
      path: agent-calendar
    description: Agent availability calendar for multi-agent scheduling
  - name: turbo-frequency
    source:
      type: git
      repo: https://github.com/fractalmind-ai/turbo-frequency-skill.git
      ref: main
      path: turbo-frequency
    description: Dynamic heartbeat frequency and one-shot follow-up policy
  - name: notifier
    source:
      type: embedded
      path: .agent/skills/notifier
    description: Multi-channel notification system (Feishu/Slack/Telegram)

template_set:
  - workspace-root
  - memory-pack
  - heartbeat-pack
  - dream-pack
  - todo-pack

assets:
  install:
    - templates/
  upgrade:
    - templates/

install_boundary:
  creates_files:
    - SYSTEM.md
    - SOUL.md
    - AGENTS.md
    - USER.md
    - HEARTBEAT.md
    - DREAM.md
    - OKR.md
    - TODO.md
    - MEMORY.md
    - TOOLS.md
    - okrs/Candidate.md
    - memory/index.md
  creates_directories:
    - memory/
    - okrs/
  bootstrap_entrypoint: manual-bootstrap
  post_install_expectations:
    - heartbeat control plane exists
    - dream maintenance boundary exists
    - TODO control plane exists
    - active OKR control plane exists
    - memory daily note path is writable
    - operator can configure messaging and agent dispatch

upgrade_boundary:
  upgrade_strategy: overlay-with-preserve
  mutable_paths:
    - HEARTBEAT.md
    - DREAM.md
    - SYSTEM.md
    - SOUL.md
    - AGENTS.md
    - templates/
  preserved_local_overrides:
    - USER.md
    - MEMORY.md
    - TOOLS.md
    - OKR.md
    - TODO.md
    - okrs/Candidate.md
    - memory/
  rollback_hint: restore previous ROM snapshot before overlay
  breaking_changes:
    - heartbeat rule renames may require manual merge
    - DREAM.md introduces a stricter maintenance boundary
    - SOUL.md principle numbering changes may require operator review
    - TODO control-plane additions may require heartbeat re-read

defaults:
  default_persona: coordinator-first
  default_heartbeat_mode: proactive
  recommended_use_cases:
    - multi-agent management
    - OKR-driven execution
    - delegation-first coordination
    - GitHub-centric development workflows
    - long-running heartbeat/dream maintenance loops
  operator_notes:
    - optimized for owner-side coordination and active OKR control planes
    - expects TODO-first heartbeat discipline
    - expects file-backed memory with daily notes and topic index
    - includes stable dream maintenance boundaries to prevent control-plane drift
    - includes battle-tested escalation templates (approval + blocker)
    - includes 45+ operating principles distilled from production experience
