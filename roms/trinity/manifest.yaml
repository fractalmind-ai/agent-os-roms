rom_name: trinity
rom_family: manager-heavy
rom_version: 0.1.0
description: Trinity ROM — a coordination-first AI employee OS tuned for watched threads, TODO-first heartbeat execution, file-backed memory, and evidence-driven delivery.

spec_version: 1.0.0
requires_spec: ">=1.0.0"
compatible_spec_range: ">=1.0.0 <2.0.0"
compatibility_status: draft-compatible

included_skills:
  - agent-manager
  - use-fractalbot
  - turbo-frequency

template_set:
  - workspace-root
  - memory-pack
  - heartbeat-pack
  - todo-pack

install_boundary:
  creates_files:
    - SYSTEM.md
    - SOUL.md
    - AGENTS.md
    - USER.md
    - HEARTBEAT.md
    - TODO.md
    - OKR.md
    - okrs/Candidate.md
  creates_directories:
    - memory/
    - okrs/
  bootstrap_entrypoint: manual-bootstrap
  post_install_expectations:
    - heartbeat control plane exists
    - TODO control plane exists
    - active OKR control plane exists
    - memory daily-note path is writable
    - operator can route outbound messages and verify delivery surfaces

upgrade_boundary:
  upgrade_strategy: overlay-with-preserve
  mutable_paths:
    - HEARTBEAT.md
    - TODO.md
    - templates/
  preserved_local_overrides:
    - USER.md
    - MEMORY.md
    - TOOLS.md
    - OKR.md
  rollback_hint: restore previous ROM snapshot before overlay
  breaking_changes:
    - heartbeat rule renames may require manual merge
    - TODO / OKR control-plane reshapes may require operator review

defaults:
  default_persona: coordinator-first
  default_heartbeat_mode: proactive
  recommended_use_cases:
    - owner-facing AI employee workspaces
    - Slack / IM heavy execution loops
    - multi-agent coordination with strict follow-up discipline
  operator_notes:
    - optimized for AI employees that must act like accountable operators, not passive chatbots
    - expects TODO-first heartbeat, file-backed memory, and post-send verification
    - designed for watched DM / watched thread environments where every action change needs a short receipt
